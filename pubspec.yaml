name: fimeride_front
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_keyboard_visibility: ^6.0.0
  url_launcher: ^6.0.10
  http: ^0.13.3
  file_selector: ^0.9.3
  image_picker: ^0.8.7+5
  flutter_dotenv: ^5.0.2
  flutter_map: ^4.0.0
  latlong2: ^0.8.1
  webview_flutter: ^4.0.0
  shared_preferences: ^2.0.0
  intl: ^0.18.0
  flutter_local_notifications: ^17.2.1
  flutter_pdfview: ^1.3.2
  path_provider: ^2.1.5
  
  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  fonts:
    - family: ADLaMDisplay
      fonts:
        - asset: assets/fonts/ADLaMDisplay-Regular.ttf
    - family: DirtyBrush
      fonts:
        - asset: assets/fonts/DirtyBrush.ttf
  assets:
    - path: assets/image/FimeRideLogo.png
    - path: assets/image/icono-perfil.png
    - path: assets/image/Fimehub.png
